name: Markdown Credential Scan

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  scan-markdown:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Scan markdown for leaked credentials
        run: python scripts/check_markdown_credentials.py
